<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わびや ランチ看板ポスター</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .poster {
      width: 594px;
      height: 841px;
      position: relative;
      overflow: hidden;
      font-family: 'Zen Old Mincho', serif;
      color: #fff;
    }

    .bg-photo {
      position: absolute;
      inset: 0;
      background: url('images/curry.jpg') 60% 55% / cover no-repeat;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.1) 15%,
        rgba(0,0,0,0.05) 35%,
        rgba(0,0,0,0.25) 60%,
        rgba(0,0,0,0.75) 82%,
        rgba(0,0,0,0.93) 100%
      );
    }

    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 44px 32px;
    }

    /* 縦書きメニュー名を右側に配置 */
    .menu-vertical {
      position: absolute;
      right: 36px;
      top: 35%;
      transform: translateY(-50%);
    }

    /* 英語ラベル: Cormorant Garamond, 字間広め (muranokajiya方式) */
    .lunch-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.6em;
      color: #c5a55a;
      margin-bottom: 10px;
      font-weight: 300;
      text-transform: uppercase;
    }

    /* メイン見出し: Zen Old Mincho, 縦書き (和食高級ポスターの法則) */
    .menu-name {
      font-family: 'Zen Old Mincho', serif;
      font-size: 46px;
      font-weight: 900;
      writing-mode: vertical-rl;
      line-height: 1.6;
      letter-spacing: 0.12em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.4);
      height: auto;
      margin-bottom: 0;
    }

    /* 価格: 大きく目立つ (サイズ比率 4.5) */
    .price {
      font-family: 'Zen Old Mincho', serif;
      font-size: 24px;
      font-weight: 400;
      color: #c5a55a;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .divider {
      width: 44px;
      height: 1px;
      background: #c5a55a;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    /* 営業時間: Noto Sans JP, 小さめ (サイズ比率 2) */
    .time {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.18em;
      margin-bottom: 14px;
      font-weight: 300;
    }

    /* 他メニュー: 最小 (サイズ比率 1) */
    .other-menu {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 10.5px;
      color: rgba(255,255,255,0.5);
      line-height: 2;
      margin-bottom: 18px;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* 店名: 明朝体, 字間広め */
    .shop-name {
      font-family: 'Zen Old Mincho', serif;
      font-size: 13px;
      color: #c5a55a;
      letter-spacing: 0.35em;
      font-weight: 400;
      opacity: 0.85;
    }

    .top-label {
      position: absolute;
      top: 28px;
      left: 44px;
    }
    .top-label span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.5em;
      color: #c5a55a;
      font-weight: 400;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    }

    @media print {
      .poster { width: 594mm; height: 841mm; }
      .menu-name { font-size: 130px; }
      .price { font-size: 155px; }
      .lunch-label { font-size: 38px; }
      .time { font-size: 32px; }
      .other-menu { font-size: 28px; }
      .shop-name { font-size: 35px; }
      .content { padding: 0 110px 90px; }
      .divider { width: 110px; height: 2px; margin-bottom: 40px; }
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #222;
    }
  </style>
</head>
<body>

<div class="poster">
  <div class="bg-photo"></div>
  <div class="overlay"></div>

  <div class="top-label">
    <span>Lunch  11:30 – 13:30</span>
  </div>

  <div class="menu-vertical">
    <h1 class="menu-name">牛すじ煮込みカレー</h1>
  </div>

  <div class="content">
    <div class="lunch-label">Signature Lunch</div>
    <div class="price">¥760</div>
    <div class="divider"></div>
    <div class="time">ランチタイム 11:30〜13:30</div>
    <div class="other-menu">
      他、焼肉ランチ定食各種 ¥800〜
    </div>
    <div class="shop-name">焼肉 和火焼 わびや</div>
  </div>
</div>

</body>
</html>
