<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>v19 フルブリードグリッド</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Kaisei+Tokumin:wght@500;700;800&family=Yuji+Syuku&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0606;font-family:'Noto Sans JP',sans-serif}
.poster{width:595px;height:842px;position:relative;overflow:hidden;background:#0a0606;color:#fff}
/* フルグリッド: 1大+5小（不規則） */
.fullgrid{position:absolute;top:60px;left:0;right:0;bottom:80px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:repeat(4,1fr);gap:0}
.fullgrid .cell{position:relative;overflow:hidden;border-right:1.5px solid #0a0606;border-bottom:1.5px solid #0a0606}
.fullgrid .cell:nth-child(3n){border-right:none}
.fullgrid .cell:last-child{border-bottom:none}
/* セルの占有 */
.fullgrid .c1{grid-column:1/3;grid-row:1/3}
.fullgrid .c2{grid-column:3/4;grid-row:1/2}
.fullgrid .c3{grid-column:3/4;grid-row:2/3}
.fullgrid .c4{grid-column:1/2;grid-row:3/5}
.fullgrid .c5{grid-column:2/3;grid-row:3/5}
.fullgrid .c6{grid-column:3/4;grid-row:3/5}
.cell .photo{position:absolute;inset:0;background-position:center;background-size:cover;filter:saturate(1.15) contrast(1.05) brightness(0.95)}
.cell .photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.15) 50%,rgba(0,0,0,0.4) 100%)}
.cell .num{position:absolute;top:8px;left:10px;background:#b32a2a;color:#fff;padding:3px 9px;font-family:'Yuji Syuku','Shippori Mincho',serif;font-size:14px;font-weight:800;line-height:1;z-index:2;box-shadow:1px 2px 0 #000}
.cell .badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#c5a55a;padding:3px 8px;font-family:'Kaisei Tokumin',serif;font-size:8px;letter-spacing:0.18em;font-weight:700;border:1px solid rgba(197,165,90,0.6);z-index:2}
.cell .badge.feat{background:#c5a55a;color:#0a0606;border-color:#c5a55a}
.cell .info{position:absolute;left:0;right:0;bottom:0;padding:10px 12px 12px;z-index:2}
.cell h3{font-family:'Yuji Syuku','Shippori Mincho',serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:0.04em;line-height:1.25;margin-bottom:5px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.cell .price{font-family:'Yuji Syuku','Shippori Mincho',serif;font-size:22px;color:#f9c34a;font-weight:800;letter-spacing:0.02em;text-shadow:0 1px 4px rgba(0,0,0,0.8);line-height:1}
/* 大セル(c1)はサイズ違い */
.cell.c1 h3{font-size:24px}
.cell.c1 .price{font-size:36px}
.cell.c1 .num{font-size:20px;padding:5px 12px}
.cell.c1 .badge{font-size:10px;padding:4px 10px}
/* 小セル */
.cell.c4 h3,.cell.c5 h3,.cell.c6 h3{font-size:13px}
.cell.c4 .price,.cell.c5 .price,.cell.c6 .price{font-size:20px}
/* ヘッダー */
.head{position:absolute;top:0;left:0;right:0;padding:14px 24px 12px;background:#0a0606;border-bottom:2px solid #c5a55a;display:flex;justify-content:space-between;align-items:center;z-index:5}
.head .l{display:flex;align-items:center;gap:14px}
.head .pill{background:#b32a2a;color:#fff;padding:4px 14px;font-family:'Kaisei Tokumin',serif;font-size:10px;letter-spacing:0.4em;font-weight:700}
.head h1{font-family:'Yuji Syuku','Shippori Mincho',serif;font-size:24px;font-weight:800;letter-spacing:0.16em;color:#fff;line-height:1}
.head h1 .em{color:#c5a55a}
.head .meta{font-family:'Kaisei Tokumin',serif;font-size:10px;letter-spacing:0.4em;color:#c5a55a;font-weight:700}
.footer{position:absolute;left:0;right:0;bottom:0;padding:12px 24px 14px;background:#000;border-top:2px solid #c5a55a;text-align:center;z-index:5}
.footer .name{font-family:'Yuji Syuku','Shippori Mincho',serif;font-size:15px;letter-spacing:0.4em;color:#c5a55a;margin-bottom:3px;font-weight:800}
.footer .info{font-family:'Noto Sans JP',sans-serif;font-size:8.5px;color:rgba(255,255,255,0.6);line-height:1.7;letter-spacing:0.08em}
.footer .info span{margin:0 5px}
@media print{@page{size:A4 portrait;margin:0}body{background:#fff;display:block;min-height:auto}.poster{width:210mm;height:297mm}}
</style></head><body>
<div class="poster">
<div class="head">
<div class="l"><span class="pill">Tonight's Picks</span><h1>Today's <span class="em">SIX</span></h1></div>
<span class="meta">DINNER · 2026.04</span>
</div>
<div class="fullgrid">
<div class="cell c1"><div class="photo" style="background-image:url('../images/gyutan-bekkaku.webp')"></div><span class="num">01</span><span class="badge feat">FEATURED</span><div class="info"><h3>【別格】厚切り牛タン</h3><div class="price">¥1,980</div></div></div>
<div class="cell c2"><div class="photo" style="background-image:url('../images/joukarubi.webp')"></div><span class="num">02</span><span class="badge">SIGNATURE</span><div class="info"><h3>黒毛和牛<br>上カルビ</h3><div class="price">¥1,580</div></div></div>
<div class="cell c3"><div class="photo" style="background-image:url('../images/negishio-tsutsumi.webp')"></div><span class="num">03</span><span class="badge">SIGNATURE</span><div class="info"><h3>牛タン<br>ネギ塩包み</h3><div class="price">¥1,480</div></div></div>
<div class="cell c4"><div class="photo" style="background-image:url('../images/ogon-tare-karubi.webp')"></div><span class="num">04</span><span class="badge">SIGNATURE</span><div class="info"><h3>黄金たれ<br>カルビ</h3><div class="price">¥1,580</div></div></div>
<div class="cell c5"><div class="photo" style="background-image:url('../images/umadare-harami.webp')"></div><span class="num">05</span><span class="badge feat">BEST</span><div class="info"><h3>うまだれ<br>ハラミ</h3><div class="price">¥1,280</div></div></div>
<div class="cell c6"><div class="photo" style="background-image:url('../images/tsubosagari.webp')"></div><span class="num">06</span><span class="badge">SIGNATURE</span><div class="info"><h3>壺サガリ<br>一本漬け</h3><div class="price">¥1,360</div></div></div>
</div>
<div class="footer">
<div class="name">焼肉 和火焼 わびや</div>
<div class="info"><span>東京都江東区白河3-9-16</span><span>菊川駅 徒歩5分</span><span>080-6576-5278</span></div>
</div>
</div></body></html>
