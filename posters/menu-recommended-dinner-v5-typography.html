<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わびや ディナーおすすめ v5 タイポグラフィ型</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;500;600;700;900&family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Old+Mincho:wght@400;500;700;900&family=Noto+Sans+JP:wght@200;300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #2a2a2a;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .poster {
      width: 595px;
      height: 842px;
      position: relative;
      overflow: hidden;
      background: #0a0806;
      color: #f4ecd8;
    }

    /* 背景: 肉のシルエット（ぼかし） */
    .bg-photo {
      position: absolute;
      inset: 0;
      background: url('../images/joukarubi.webp') center 30% / cover no-repeat;
      filter: brightness(0.35) blur(2px);
      opacity: 0.7;
    }
    .bg-grad {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(10,8,6,0.7) 0%, rgba(10,8,6,0.2) 35%, rgba(10,8,6,0.7) 100%);
    }

    /* WAGYU ジャイアントタイポ */
    .giant {
      position: absolute;
      top: 90px;
      left: -10px;
      right: -10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 215px;
      font-weight: 400;
      letter-spacing: 0.005em;
      line-height: 0.8;
      color: transparent;
      -webkit-text-stroke: 1px rgba(244,236,216,0.85);
      text-stroke: 1px rgba(244,236,216,0.85);
      text-align: center;
      mix-blend-mode: screen;
    }

    .giant-fill {
      position: absolute;
      top: 250px;
      left: 0;
      right: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 215px;
      letter-spacing: 0.005em;
      line-height: 0.8;
      color: #c5a55a;
      text-align: center;
      mix-blend-mode: overlay;
      opacity: 0.9;
    }

    /* 上部ラベル */
    .topbar {
      position: absolute;
      top: 36px;
      left: 0;
      right: 0;
      padding: 0 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
    }
    .topbar .left {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.4em;
      color: #c5a55a;
    }
    .topbar .right {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.5em;
      color: rgba(244,236,216,0.6);
    }

    /* 中央に縦書きの和文 */
    .vert-jp {
      position: absolute;
      top: 95px;
      right: 44px;
      writing-mode: vertical-rl;
      font-family: 'Shippori Mincho', serif;
      font-size: 20px;
      letter-spacing: 0.45em;
      color: #c5a55a;
      z-index: 3;
      font-weight: 500;
    }

    /* ジャパニーズ和文タグライン */
    .tagline {
      position: absolute;
      top: 430px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 3;
    }
    .tagline .small {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.5em;
      color: #c5a55a;
      margin-bottom: 6px;
    }
    .tagline .big {
      font-family: 'Shippori Mincho', serif;
      font-size: 30px;
      letter-spacing: 0.32em;
      color: #f4ecd8;
      font-weight: 500;
    }

    /* 6品リスト（下部、左右2列） */
    .menu {
      position: absolute;
      bottom: 110px;
      left: 44px;
      right: 44px;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 28px;
    }

    .item {
      display: flex;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid rgba(244,236,216,0.18);
      gap: 10px;
    }

    .item .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: #c5a55a;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }
    .item .name {
      font-family: 'Shippori Mincho', serif;
      font-size: 12.5px;
      color: #f4ecd8;
      letter-spacing: 0.04em;
      flex: 1;
      line-height: 1.3;
    }
    .item .price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #c5a55a;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* フッター */
    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 44px 22px;
      text-align: center;
      z-index: 3;
      border-top: 1px solid rgba(197,165,90,0.3);
      background: rgba(0,0,0,0.4);
    }
    .footer .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.45em;
      color: #c5a55a;
      margin-bottom: 4px;
    }
    .footer .info {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 8.5px;
      color: rgba(244,236,216,0.55);
      line-height: 1.7;
      letter-spacing: 0.08em;
    }
    .footer .info span { margin: 0 5px; }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: #fff; display: block; min-height: auto; }
      .poster { width: 210mm; height: 297mm; }
    }
  </style>
</head>
<body>

<div class="poster">

  <div class="bg-photo"></div>
  <div class="bg-grad"></div>

  <div class="topbar">
    <span class="left">DINNER / RECOMMENDED</span>
    <span class="right">A4 / 2026</span>
  </div>

  <div class="giant">WAGYU<br>YAKINIKU</div>

  <div class="vert-jp">本 日 厳 選 六 品</div>

  <div class="tagline">
    <div class="small">— SELECTED 6 ITEMS —</div>
    <div class="big">焼 肉 和 火 焼  わ び や</div>
  </div>

  <div class="menu">
    <div class="item">
      <span class="num">01</span>
      <span class="name">【別格】厚切り牛タン</span>
      <span class="price">¥1,980</span>
    </div>
    <div class="item">
      <span class="num">02</span>
      <span class="name">黒毛和牛 上カルビ</span>
      <span class="price">¥1,580</span>
    </div>
    <div class="item">
      <span class="num">03</span>
      <span class="name">牛タンネギ塩包み</span>
      <span class="price">¥1,480</span>
    </div>
    <div class="item">
      <span class="num">04</span>
      <span class="name">黄金たれカルビ</span>
      <span class="price">¥1,580</span>
    </div>
    <div class="item">
      <span class="num">05</span>
      <span class="name">うまだれハラミ</span>
      <span class="price">¥1,280</span>
    </div>
    <div class="item">
      <span class="num">06</span>
      <span class="name">特製ダレ壺サガリ</span>
      <span class="price">¥1,360</span>
    </div>
  </div>

  <div class="footer">
    <div class="name">WABIYA</div>
    <div class="info">
      <span>東京都江東区白河3-9-16</span><span>菊川駅 徒歩5分</span><span>080-6576-5278</span>
    </div>
    <div class="info">
      <span>ディナー（平日）18:00〜22:00 L.O.21:30</span><span>土日祝 17:00〜22:00</span>
    </div>
  </div>

</div>

</body>
</html>
