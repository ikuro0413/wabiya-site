<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わびや アンケートQRポスター A4</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* A4: 210mm x 297mm = 595 x 842px @72dpi */
    .poster {
      width: 595px;
      height: 842px;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Zen Old Mincho', serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 36px 40px 40px;
    }

    /* 背景: 深いグラデーション＋和紙質感 */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, #1a1411 0%, #0a0806 70%),
        repeating-linear-gradient(
          45deg,
          transparent 0, transparent 2px,
          rgba(197,165,90,0.02) 2px, rgba(197,165,90,0.02) 3px
        );
    }

    /* 四隅の装飾ライン */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1px solid #c5a55a;
      opacity: 0.6;
    }
    .corner.tl { top: 24px; left: 24px; border-right: none; border-bottom: none; }
    .corner.tr { top: 24px; right: 24px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 24px; left: 24px; border-right: none; border-top: none; }
    .corner.br { bottom: 24px; right: 24px; border-left: none; border-top: none; }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* 上部ブランド */
    .brand-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.7em;
      color: #c5a55a;
      font-weight: 300;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .brand-jp {
      font-family: 'Zen Old Mincho', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.4em;
      margin-bottom: 4px;
      color: #f5f0e6;
    }
    .brand-sub {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: #888;
      margin-bottom: 14px;
    }

    /* 区切り */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c5a55a, transparent);
      margin: 0 0 20px;
    }

    /* メイン訴求 */
    .hero-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: 0.5em;
      color: #c5a55a;
      margin-bottom: 8px;
    }
    .hero-main {
      font-family: 'Zen Old Mincho', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.4;
      margin-bottom: 14px;
      color: #f5f0e6;
    }
    .hero-main .accent {
      color: #c5a55a;
    }

    /* 20% OFF バッジ */
    .discount {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin-bottom: 10px;
    }
    .discount .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 88px;
      font-weight: 600;
      color: #c5a55a;
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px rgba(197,165,90,0.3);
    }
    .discount .pct {
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 600;
      color: #c5a55a;
      line-height: 1;
    }
    .discount .off {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 500;
      color: #c5a55a;
      letter-spacing: 0.15em;
      margin-left: 8px;
    }
    .discount-desc {
      font-size: 13px;
      color: #f5f0e6;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .discount-desc strong {
      color: #c5a55a;
      font-weight: 700;
    }

    /* QRコードエリア */
    .qr-wrap {
      background: #fff;
      padding: 14px;
      border-radius: 4px;
      box-shadow: 0 12px 40px rgba(197,165,90,0.2);
      margin-bottom: 16px;
    }
    .qr-wrap img {
      display: block;
      width: 210px;
      height: 210px;
    }
    .qr-caption {
      font-family: 'Zen Old Mincho', serif;
      font-size: 15px;
      letter-spacing: 0.2em;
      color: #f5f0e6;
      margin-bottom: 22px;
      font-weight: 700;
    }
    .qr-caption .icon { color: #c5a55a; }

    /* 有効期限 */
    .expiry {
      padding: 10px 28px;
      border: 1px solid #c5a55a;
      color: #f5f0e6;
      font-size: 12px;
      letter-spacing: 0.2em;
      border-radius: 2px;
      background: transparent;
    }
    .expiry strong {
      color: #c5a55a;
      font-weight: 700;
      margin-left: 6px;
      letter-spacing: 0.1em;
    }

    /* フッター */
    .footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Zen Old Mincho', serif;
      font-size: 10px;
      color: #888;
      letter-spacing: 0.4em;
      z-index: 1;
    }

    /* 印刷設定 */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @media print {
      body {
        margin: 0;
        background: #fff;
      }
      .poster {
        margin: 0;
        box-shadow: none;
      }
    }
    body {
      margin: 0;
      padding: 20px;
      background: #2a2a2a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
  </style>
</head>
<body>

<div class="poster">
  <div class="bg"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="brand-en">W A B I Y A</div>
    <div class="brand-jp">焼 肉 和 火 焼</div>
    <div class="brand-sub">K I Y O S U M I &nbsp; S H I R A K A W A</div>

    <div class="divider"></div>

    <div class="hero-label">SPECIAL OFFER</div>
    <div class="hero-main">ご来店の<span class="accent">御礼</span>に<br>次回<span class="accent">20%OFF</span>クーポン進呈</div>

    <div class="discount">
      <span class="num">20</span><span class="pct">%</span><span class="off">OFF</span>
    </div>

    <div class="discount-desc">
      <strong>簡単4問アンケート</strong>にお答えいただくだけ<br>
      その場でクーポンをプレゼント
    </div>

    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=https%3A%2F%2Fwabiya.jp%2Fsurvey.html&margin=0&ecc=H" alt="アンケートQRコード">
    </div>
    <div class="qr-caption"><span class="icon">▲</span> スマホで読み取ってください <span class="icon">▲</span></div>

    <div class="expiry">
      有効期限 <strong>2026年5月30日（土）まで</strong>
    </div>
  </div>

  <div class="footer">焼 肉 和 火 焼 わ び や</div>
</div>

</body>
</html>
